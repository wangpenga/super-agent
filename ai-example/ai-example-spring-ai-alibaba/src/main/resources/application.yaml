server:
  port: 7089
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ai-example-spring-ai-alibaba
  ai:
    deepseek:
      base-url: https://api.deepseek.com
      api-key: sk-0fffa84412f84ed5b7aff348c1200b2e
      chat:
        options:
          model: deepseek-chat
          temperature: 0.3
  main:
    allow-bean-definition-overriding: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    servlet:
      load-on-startup: 1
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

logging:
  level:
    org.springframework.ai: DEBUG
    com.alibaba.cloud.ai: DEBUG

management:
  metrics:
    tags:
      application: ai-example-spring-ai-alibaba
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'
  health:
    elasticsearch:
      enabled: false
  prometheus:
    metrics:
      export:
        enabled: true
