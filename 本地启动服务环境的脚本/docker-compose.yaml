services:
  # ==================== MySQL 5.7 ====================
  mysql57:
    image: mysql:8.0
    container_name: mysql57
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql57-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  # ==================== PostgreSQL (pgvector) ====================
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: pgvector
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      TZ: Asia/Shanghai
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
    volumes:
      - pgvector-data:/var/lib/postgresql/data
      # 首次启动时自动创建 vector 扩展，仅对新建数据库生效
      - ./init-pgvector.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql

  # ==================== Redis ====================
  redis:
    image: redis:6.0.8
    container_name: redis
    restart: unless-stopped
    ports:
      - "0.0.0.0:6379:6379"
    command: redis-server --requirepass "123456" --bind 0.0.0.0

  # ==================== MinIO ====================
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "12345678"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  # ==================== Zookeeper ====================
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    restart: always
    privileged: true
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/data
      - zookeeper-datalog:/datalog
    networks:
      - kafka-net

  # ==================== Kafka ====================
  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 0
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 如果部署在远程服务器，请将 localhost 替换为服务器公网 IP
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
    networks:
      - kafka-net
    depends_on:
      - zookeeper

  # ==================== Elasticsearch ====================
  es:
    build: ./elasticsearch
    container_name: es
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms768m -Xms768m"
      # 开发环境关闭安全认证，方便一键启动
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
    networks:
      - elk

  # ==================== Kibana ====================
  kibana:
    image: kibana:8.5.2
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: "http://es:9200"
      I18N_LOCALE: zh-CN
    networks:
      - elk
    depends_on:
      - es

  # ==================== Neo4j ====================
  neo4j:
    image: neo4j:5.22-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/12345678"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j-data:/data

# ==================== 持久化卷 ====================
volumes:
  mysql57-data:
  pgvector-data:
  minio-data:
  zookeeper-data:
  zookeeper-datalog:
  neo4j-data:

# ==================== 网络 ====================
networks:
  kafka-net:
    driver: bridge
  elk:
    driver: bridge
